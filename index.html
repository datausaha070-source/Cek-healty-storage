<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HP Service Detector</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:14px 25px;
margin:10px;
font-size:16px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

#log{
margin-top:20px;
background:#020617;
padding:20px;
border-radius:10px;
text-align:left;
}
</style>
</head>

<body>

<h2>HP Service Tool (Web)</h2>

<button onclick="detectUSB()">Deteksi USB</button>
<button onclick="detectSerial()">Deteksi Port</button>

<div id="log">Status : menunggu perangkat...</div>

<script>

async function detectUSB(){

try{

const device = await navigator.usb.requestDevice({
filters:[]
});

document.getElementById("log").innerHTML=
"Perangkat ditemukan<br><br>"+
"Nama : "+device.productName+"<br>"+
"Vendor ID : "+device.vendorId+"<br>"+
"Product ID : "+device.productId;

}catch(e){

document.getElementById("log").innerHTML=
"Tidak ada perangkat dipilih";

}

}

async function detectSerial(){

try{

const port = await navigator.serial.requestPort();

document.getElementById("log").innerHTML=
"Port Serial terdeteksi";

}catch(e){

document.getElementById("log").innerHTML=
"Gagal membaca port";

}

}

</script>

</body>
</html>
