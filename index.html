<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HP Detector</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:15px 30px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Deteksi HP via USB</h2>

<button onclick="connectUSB()">Hubungkan HP</button>

<p id="hasil"></p>

<script>

async function connectUSB(){

try{

const device = await navigator.usb.requestDevice({
filters:[]
});

document.getElementById("hasil").innerHTML =
"Perangkat terdeteksi: "+device.productName;

}catch(e){

document.getElementById("hasil").innerHTML =
"Gagal mendeteksi perangkat";

}

}

</script>

</body>
</html>
